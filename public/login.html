<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — StarGifts</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">⭐ StarGifts</div>
    <h2>Welcome Back</h2>
    <p class="auth-sub">Sign in to your StarGifts account</p>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input id="email" class="form-input" type="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input id="password" class="form-input" type="password" placeholder="••••••••" required>
      </div>
      <div id="error-msg" class="hidden" style="color:var(--accent);margin-bottom:1rem;font-size:0.85rem;background:var(--accent-dim);padding:0.75rem 1rem;border-radius:var(--radius-sm);border:1px solid rgba(255,77,109,0.3)"></div>
      <button type="submit" id="submit-btn" class="btn btn-gold btn-block" style="margin-top:0.5rem;padding:0.85rem">Sign In</button>
    </form>

    <div class="auth-switch mt-2">
      Don't have an account? <a href="/register.html">Create one</a>
    </div>
    <div class="auth-switch mt-1">
      <a href="/" style="color:var(--text-muted);font-size:0.8rem">← Back to home</a>
    </div>
  </div>
</div>

<script src="/js/toast.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = '/';

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const errEl = document.getElementById('error-msg');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
    errEl.classList.add('hidden');
    try {
      const data = await API.post('/auth/login', {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      });
      Auth.setSession(data.token, data.user);
      const next = new URLSearchParams(location.search).get('next');
      window.location.href = data.user.role === 'admin' ? '/admin/' : (next || '/');
    } catch(e) {
      errEl.textContent = e.message;
      errEl.classList.remove('hidden');
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
