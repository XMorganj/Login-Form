<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — StarGifts</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" href="/">⭐ StarGifts</a>
</nav>

<div style="max-width:600px;margin:4rem auto;padding:0 2rem;text-align:center">
  <div style="font-size:4rem;margin-bottom:1rem">🎉</div>
  <h1 style="font-size:2rem;margin-bottom:0.8rem">Order Confirmed!</h1>
  <p class="text-muted" style="margin-bottom:2rem">Thank you for your gift. Your order is being processed.</p>

  <div id="order-details" class="order-summary-card" style="text-align:left">
    <div class="spinner" style="margin:1rem auto;display:block;width:30px;height:30px"></div>
  </div>

  <div style="display:flex;gap:1rem;justify-content:center;margin-top:2rem">
    <a href="/shop.html" class="btn btn-outline">Continue Shopping</a>
    <a href="/" class="btn btn-gold">Back to Home</a>
  </div>
</div>

<script src="/js/toast.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
  const orderId = new URLSearchParams(location.search).get('id');
  if (!orderId) window.location.href = '/';

  async function loadOrder() {
    try {
      const order = await API.get('/payments/order/' + orderId);
      document.getElementById('order-details').innerHTML = `
        <div style="display:flex;justify-content:space-between;margin-bottom:1rem">
          <span class="text-muted">Order ID</span>
          <span style="font-family:monospace;font-size:0.8rem">${order._id}</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem">
          <span class="text-muted">Payment</span>
          <span class="badge badge-gold">${order.paymentMethod === 'bitcoin' ? '₿ Bitcoin' : '💳 Card'}</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem">
          <span class="text-muted">Status</span>
          <span>${order.paymentStatus === 'paid' ? '✅ Paid' : '⏳ Pending'}</span>
        </div>
        <div class="divider"></div>
        ${order.items.map(i => `
          <div style="display:flex;justify-content:space-between;font-size:0.9rem;margin-bottom:0.4rem">
            <span>${i.name} ×${i.quantity}</span>
            <span>$${(i.price * i.quantity).toFixed(2)}</span>
          </div>`).join('')}
        <div class="divider"></div>
        <div style="display:flex;justify-content:space-between;font-weight:700">
          <span>Total</span><span class="text-gold">$${order.total.toFixed(2)}</span>
        </div>
      `;
    } catch(e) {
      document.getElementById('order-details').innerHTML = '<p class="text-muted text-center">Could not load order details.</p>';
    }
  }

  loadOrder();
</script>
</body>
</html>
