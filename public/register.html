<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — StarGifts</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" href="/">⭐ StarGifts</a>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>Create Account</h2>
    <p>Join the StarGifts fan community</p>

    <form id="register-form">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input id="name" class="form-input" placeholder="Your Name" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="email" class="form-input" type="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password (min 6 characters)</label>
        <input id="password" class="form-input" type="password" placeholder="••••••••" required minlength="6">
      </div>
      <div id="error-msg" class="hidden" style="color:var(--accent);margin-bottom:1rem;font-size:0.9rem"></div>
      <button type="submit" id="submit-btn" class="btn btn-gold btn-block">Create Account</button>
    </form>

    <div class="auth-switch">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="/js/toast.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = '/';

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const errEl = document.getElementById('error-msg');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
    errEl.classList.add('hidden');
    try {
      const data = await API.post('/auth/register', {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      });
      Auth.setSession(data.token, data.user);
      showToast('Account created! Welcome to StarGifts.', 'success');
      setTimeout(() => { window.location.href = '/'; }, 1000);
    } catch(e) {
      errEl.textContent = e.message;
      errEl.classList.remove('hidden');
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  });
</script>
</body>
</html>
