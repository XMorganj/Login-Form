<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celebrities — StarGifts</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="ticker-wrap"><div class="ticker-track" id="ticker-track">Loading activity…</div></div>
<nav class="navbar">
  <a class="navbar-brand" href="/">⭐ StarGifts</a>
  <div class="navbar-links">
    <a href="/celebrities.html" class="active">Celebrities</a>
    <a href="/shop.html">Shop</a>
  </div>
  <div class="navbar-actions">
    <button class="cart-btn" onclick="Cart.openSidebar()">🛒 Cart <span class="cart-count" style="display:none">0</span></button>
    <div id="nav-actions" style="display:flex;gap:0.5rem;align-items:center"></div>
  </div>
</nav>

<div class="page-header">
  <h1>All <span class="text-gold">Celebrities</span></h1>
  <p class="text-muted mt-1">Browse and support your favourite stars</p>
</div>

<div class="section" style="padding-top:2rem">
  <!-- Search + Filters -->
  <div style="display:flex;flex-direction:column;gap:1.2rem;margin-bottom:2.5rem">
    <div class="search-wrap" style="max-width:380px">
      <span class="search-icon">🔍</span>
      <input id="search" class="search-input" placeholder="Search celebrities..." oninput="debouncedLoad()">
    </div>
    <div class="filter-bar">
      <button class="filter-pill active" data-cat="">All Categories</button>
      <button class="filter-pill" data-cat="music">🎵 Music</button>
      <button class="filter-pill" data-cat="film">🎬 Film</button>
      <button class="filter-pill" data-cat="sports">⚽ Sports</button>
      <button class="filter-pill" data-cat="tv">📺 TV</button>
      <button class="filter-pill" data-cat="other">✨ Other</button>
    </div>
  </div>

  <div id="celebs-grid" class="grid grid-3">
    <div class="empty-state"><div class="spinner"></div></div>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <div>
      <div class="footer-brand">⭐ StarGifts</div>
      <div class="footer-copy">© 2017–2025 StarGifts. All rights reserved.</div>
    </div>
    <div class="footer-links">
      <a href="/">Home</a><a href="/shop.html">Shop</a><a href="/login.html">Login</a>
    </div>
  </div>
</footer>

<div class="cart-overlay" id="cart-overlay" onclick="Cart.closeSidebar()"></div>
<div class="cart-sidebar" id="cart-sidebar">
  <div class="cart-header"><h3>Your Cart</h3><button class="cart-close" onclick="Cart.closeSidebar()">✕</button></div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total-row"><span class="cart-total-label">Total</span><span class="cart-total-val" id="cart-total">$0.00</span></div>
    <a href="/checkout.html" class="btn btn-gold btn-block">Checkout</a>
  </div>
</div>

<script src="/js/ticker.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/cart.js"></script>
<script>
  let activeCategory = '';

  document.querySelectorAll('.filter-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = btn.dataset.cat;
      loadCelebs();
    });
  });

  async function loadCelebs() {
    const search = document.getElementById('search').value;
    const params = new URLSearchParams();
    if (activeCategory) params.set('category', activeCategory);
    if (search) params.set('search', search);
    try {
      const celebs = await API.get('/celebrities?' + params);
      const el = document.getElementById('celebs-grid');
      if (!celebs.length) {
        el.innerHTML = '<div class="empty-state"><div class="empty-icon">🌟</div><h3>No celebrities found</h3><p>Try a different search or category</p></div>';
        return;
      }
      el.innerHTML = celebs.map(c => `
        <a href="/celebrity.html?slug=${c.slug}" class="card" style="text-decoration:none;color:inherit">
          <div class="card-img-wrap" style="position:relative">
            <img class="card-img celeb-card-img" src="${c.photo || '/img/placeholder.svg'}" alt="${c.name}" onerror="this.src='/img/placeholder.svg'">
            <div class="celeb-card-overlay">
              <div class="celeb-card-name">${c.name}</div>
              <div class="celeb-card-cat">${c.category}${c.nationality ? ' · ' + c.nationality : ''}</div>
            </div>
            ${c.featured ? '<div style="position:absolute;top:1rem;right:1rem"><span class="badge badge-gold">⭐ Featured</span></div>' : ''}
          </div>
          <div class="celeb-card-body">
            <div class="celeb-card-bio">${c.shortBio || c.bio?.substring(0,100) + '...' || 'View full profile'}</div>
            <div style="font-size:0.8rem;color:var(--gold);font-weight:600">View profile & gifts →</div>
          </div>
        </a>`).join('');
    } catch(e) {
      document.getElementById('celebs-grid').innerHTML = '<div class="empty-state"><h3>Failed to load</h3></div>';
    }
  }
  let _debounceTimer;
  function debouncedLoad() { clearTimeout(_debounceTimer); _debounceTimer = setTimeout(loadCelebs, 300); }
  loadCelebs();
</script>
</body>
</html>
