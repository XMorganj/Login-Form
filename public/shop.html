<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gift Shop — StarGifts</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" href="/">⭐ StarGifts</a>
  <div class="navbar-links">
    <a href="/celebrities.html">Celebrities</a>
    <a href="/shop.html" class="active">Shop</a>
  </div>
  <div class="navbar-actions">
    <button class="cart-btn" onclick="Cart.openSidebar()">🛒 Cart <span class="cart-count" style="display:none">0</span></button>
    <div id="nav-actions" style="display:flex;gap:0.5rem;align-items:center"></div>
  </div>
</nav>

<div class="page-header">
  <h1>Gift <span class="text-gold">Shop</span></h1>
  <p class="text-muted mt-1">Exclusive merchandise and gifts for your favourite celebrities</p>
</div>

<div class="section" style="padding-top:2rem">
  <div style="display:flex;flex-direction:column;gap:1.2rem;margin-bottom:2.5rem">
    <div class="search-wrap" style="max-width:380px">
      <span class="search-icon">🔍</span>
      <input id="search" class="search-input" placeholder="Search gifts or celebrities..." oninput="debouncedLoad()">
    </div>
    <div class="filter-bar">
      <button class="filter-pill active" data-cat="">All Gifts</button>
      <button class="filter-pill" data-cat="merchandise">👕 Merchandise</button>
      <button class="filter-pill" data-cat="digital">💿 Digital</button>
      <button class="filter-pill" data-cat="experience">🎟️ Experience</button>
      <button class="filter-pill" data-cat="donation">💝 Donation</button>
    </div>
  </div>

  <div id="products-grid" class="grid grid-4">
    <div class="empty-state"><div class="spinner"></div></div>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <div>
      <div class="footer-brand">⭐ StarGifts</div>
      <div class="footer-copy">© 2017–2025 StarGifts. All rights reserved.</div>
    </div>
    <div class="footer-links">
      <a href="/">Home</a><a href="/celebrities.html">Celebrities</a><a href="/login.html">Login</a>
    </div>
  </div>
</footer>

<div class="cart-overlay" id="cart-overlay" onclick="Cart.closeSidebar()"></div>
<div class="cart-sidebar" id="cart-sidebar">
  <div class="cart-header"><h3>Your Cart</h3><button class="cart-close" onclick="Cart.closeSidebar()">✕</button></div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total-row"><span class="cart-total-label">Total</span><span class="cart-total-val" id="cart-total">$0.00</span></div>
    <a href="/checkout.html" class="btn btn-gold btn-block">Checkout</a>
  </div>
</div>

<script src="/js/toast.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/cart.js"></script>
<script>
  let activeCategory = '';

  document.querySelectorAll('.filter-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = btn.dataset.cat;
      loadProducts();
    });
  });

  async function loadProducts() {
    const search = document.getElementById('search').value.toLowerCase();
    const params = new URLSearchParams();
    if (activeCategory) params.set('category', activeCategory);
    try {
      let products = await API.get('/products?' + params);
      if (search) products = products.filter(p =>
        p.name.toLowerCase().includes(search) || p.celebrity?.name?.toLowerCase().includes(search));
      const el = document.getElementById('products-grid');
      if (!products.length) {
        el.innerHTML = '<div class="empty-state"><div class="empty-icon">🎁</div><h3>No gifts found</h3><p>Try a different search or category</p></div>';
        return;
      }
      el.innerHTML = products.map(p => `
        <div class="card" onclick="window.location='/product.html?id=${p._id}'" style="cursor:pointer">
          <div class="card-img-wrap">
            <img class="card-img" src="${p.images?.[0] || '/img/placeholder.svg'}" alt="${p.name}" onerror="this.src='/img/placeholder.svg'">
          </div>
          <div class="card-body">
            ${p.celebrity ? `<div class="card-label"><a href="/celebrity.html?slug=${p.celebrity.slug}" style="color:var(--gold);text-decoration:none" onclick="event.stopPropagation()">${p.celebrity.name}</a></div>` : ''}
            <div class="card-title">${p.name}</div>
            <div class="card-sub">${p.description?.substring(0,65)}...</div>
            <div class="card-footer">
              <div class="card-price">$${p.price.toFixed(2)}</div>
              <button class="btn btn-gold btn-sm" onclick='event.stopPropagation();Cart.add(${JSON.stringify(p)})'>Add to Cart</button>
            </div>
          </div>
        </div>`).join('');
    } catch(e) {
      document.getElementById('products-grid').innerHTML = '<div class="empty-state"><h3>Failed to load</h3></div>';
    }
  }
  let _debounceTimer;
  function debouncedLoad() { clearTimeout(_debounceTimer); _debounceTimer = setTimeout(loadProducts, 300); }
  loadProducts();
</script>
</body>
</html>
